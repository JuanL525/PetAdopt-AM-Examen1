<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetAdopt – Autenticación</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #090d16;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(22, 32, 51, 0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }
    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #ffffff;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #34d399; }
    button {
      width: 100%;
      padding: 15px;
      background: #34d399;
      color: #0f172a;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #10b981; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .message.success { background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3); color: #34d399; }
    .message.error { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: #f87171; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="logo">🐾</div>
    <h1>PetAdopt</h1>
    <p class="subtitle" id="subtitle">Cargando...</p>
    <div id="form-container"></div>
    <div class="message" id="message"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://xjagectkljlgkhxxmjnu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqYWdlY3RrbGpsZ2toeHhtam51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDczODAsImV4cCI6MjA5MjYyMzM4MH0.7MpHAkjYLQ9LhBN3JGjhEaHjpkzUS9QQLUnp-ulixkQ';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const hash = Object.fromEntries(new URLSearchParams(window.location.hash.substring(1)));
    const type = params.get('type') || hash.type;
    const tokenHash = params.get('token_hash');
    const accessToken = hash.access_token;
    const refreshToken = hash.refresh_token;

    function showMessage(text, isError) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + (isError ? 'error' : 'success');
      el.style.display = 'block';
    }

    async function handleEmailConfirm() {
      document.getElementById('subtitle').textContent = 'Confirmando tu cuenta...';
      try {
        if (tokenHash) {
          const { error } = await sb.auth.verifyOtp({ token_hash: tokenHash, type: 'email' });
          if (error) throw error;
        }
        document.getElementById('subtitle').textContent = '¡Cuenta confirmada!';
        document.getElementById('form-container').innerHTML = '<p style="font-size:48px;margin:20px 0">✅</p>';
        showMessage('Tu cuenta fue confirmada exitosamente. Puedes abrir la app PetAdopt.', false);
        setTimeout(() => window.location.href = 'michatapp://', 2000);
      } catch (e) {
        document.getElementById('subtitle').textContent = 'Error al confirmar';
        showMessage('No se pudo confirmar la cuenta: ' + e.message, true);
      }
    }

    async function handlePasswordReset() {
      document.getElementById('subtitle').textContent = 'Verificando enlace...';

      if (tokenHash) {
        const { error } = await sb.auth.verifyOtp({ token_hash: tokenHash, type: 'recovery' });
        if (error) {
          document.getElementById('subtitle').textContent = 'Enlace inválido';
          showMessage('El enlace es inválido o ha expirado. Solicita uno nuevo desde la app.', true);
          return;
        }
      } else if (accessToken) {
        const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
        if (error) {
          document.getElementById('subtitle').textContent = 'Sesión inválida';
          showMessage('No se pudo autenticar. El enlace puede haber expirado.', true);
          return;
        }
      } else {
        document.getElementById('subtitle').textContent = 'Enlace inválido';
        showMessage('No se encontró un token de recuperación válido en este enlace.', true);
        return;
      }

      document.getElementById('subtitle').textContent = 'Crear nueva contraseña';
      document.getElementById('form-container').innerHTML = `
        <input type="password" id="password" placeholder="Nueva contraseña (mín. 6 caracteres)" />
        <input type="password" id="confirm" placeholder="Confirmar contraseña" />
        <button onclick="submitNewPassword()">Actualizar Contraseña</button>
      `;
    }

    async function submitNewPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password.length < 6) { showMessage('La contraseña debe tener al menos 6 caracteres', true); return; }
      if (password !== confirm) { showMessage('Las contraseñas no coinciden', true); return; }

      document.querySelector('button').disabled = true;
      try {
        const { error } = await sb.auth.updateUser({ password });
        if (error) throw error;
        showMessage('¡Contraseña actualizada! Abre la app PetAdopt para iniciar sesión.', false);
        setTimeout(() => window.location.href = 'michatapp://', 2000);
      } catch (e) {
        showMessage('Error: ' + e.message, true);
        document.querySelector('button').disabled = false;
      }
    }

    if (type === 'signup' || type === 'email') {
      handleEmailConfirm();
    } else if (type === 'recovery') {
      handlePasswordReset();
    } else {
      document.getElementById('subtitle').textContent = 'Plataforma de Adopción de Mascotas';
      document.getElementById('form-container').innerHTML = '<p style="color:#94a3b8;font-size:14px;margin-top:10px">Abre PetAdopt desde tu celular.</p>';
    }
  </script>
</body>
</html>
