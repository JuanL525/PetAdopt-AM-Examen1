<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="supported-color-schemes" content="light" />
  <title>PetAdopt – Restablecer contraseña</title>
  <style>
    html { color-scheme: light; background-color: #FAFAF8; }
    body { background-color: #FAFAF8 !important; color: #2E2E28 !important; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-badge">🐾</div>
    <h1>PetAdopt</h1>
    <span class="hero-tag">Recuperar acceso</span>
  </header>

  <main class="card">
    <p class="subtitle" id="subtitle">Verificando enlace...</p>
    <div id="form-container"></div>
    <div class="message" id="message"></div>
    <p class="footer-note">Plataforma de adopción de mascotas</p>
  </main>

  <script src="/auth.js"></script>
  <script>
    const sb = createSupabaseClient();

    function showPasswordForm() {
      document.getElementById('subtitle').textContent = 'Crear nueva contraseña';
      document.getElementById('form-container').innerHTML = `
        <input type="password" id="password" placeholder="Nueva contraseña (mín. 6 caracteres)" />
        <input type="password" id="confirm" placeholder="Confirmar contraseña" />
        <button id="submit-btn">Actualizar contraseña</button>
      `;
      document.getElementById('submit-btn').onclick = submitNewPassword;
    }

    async function submitNewPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password.length < 6) { showMessage('La contraseña debe tener al menos 6 caracteres', true); return; }
      if (password !== confirm) { showMessage('Las contraseñas no coinciden', true); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      try {
        const { error } = await sb.auth.updateUser({ password });
        if (error) throw error;
        showMessage('¡Contraseña actualizada! Abre la app PetAdopt para iniciar sesión.', false);
        setTimeout(() => { window.location.href = 'michatapp://'; }, 2000);
      } catch (e) {
        showMessage('Error: ' + e.message, true);
        btn.disabled = false;
      }
    }

    async function boot() {
      const p = parseAuthParams();
      if (p.errorCode) {
        showExpiredLinkHelp('recuperación');
        return;
      }

      const result = await establishSession(sb, 'recovery');
      if (!result.ok) {
        document.getElementById('subtitle').textContent = 'Enlace inválido';
        showMessage(result.error + ' Solicita uno nuevo desde la app.', true);
        return;
      }

      showPasswordForm();
    }

    boot();
  </script>
</body>
</html>
