<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="supported-color-schemes" content="light" />
  <title>PetAdopt – Confirmar cuenta</title>
  <style>
    html { color-scheme: light; background-color: #FAFAF8; }
    body { background-color: #FAFAF8 !important; color: #2E2E28 !important; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-badge">🐾</div>
    <h1>PetAdopt</h1>
    <span class="hero-tag">Confirmar cuenta</span>
  </header>

  <main class="card">
    <p class="subtitle" id="subtitle">Confirmando tu cuenta...</p>
    <div id="form-container"></div>
    <div class="message" id="message"></div>
    <p class="footer-note">Plataforma de adopción de mascotas</p>
  </main>

  <script src="/auth.js"></script>
  <script>
    const sb = createSupabaseClient();

    async function boot() {
      const p = parseAuthParams();
      if (p.errorCode) {
        showExpiredLinkHelp('confirmación');
        return;
      }

      const result = await establishSession(sb, 'email');
      if (!result.ok) {
        document.getElementById('subtitle').textContent = 'Error al confirmar';
        showMessage('No se pudo confirmar la cuenta: ' + result.error, true);
        return;
      }

      document.getElementById('subtitle').textContent = '¡Cuenta confirmada!';
      document.getElementById('form-container').innerHTML = '<div class="state-icon success-ring">✅</div>';
      showMessage('Tu cuenta fue confirmada. Ya puedes abrir la app PetAdopt.', false);
      setTimeout(() => { window.location.href = 'michatapp://'; }, 2000);
    }

    boot();
  </script>
</body>
</html>
